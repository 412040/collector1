<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端收藏庫 - HTML 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .modal-bg { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- 導覽列 -->
    <nav class="fixed top-0 left-0 right-0 h-16 glass-nav border-b border-slate-200 z-40 px-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-box-open text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800 hidden md:block">雲端收藏庫</h1>
        </div>

        <div class="flex items-center gap-4 flex-1 max-w-md mx-4">
            <div class="relative w-full">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋名稱或類別..." 
                    class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-full text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div id="userInfo" class="hidden items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="userName" class="text-xs font-bold text-slate-800"></p>
                    <p class="text-[10px] text-slate-400">已登入</p>
                </div>
                <button id="logoutBtn" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt text-lg"></i>
                </button>
            </div>
            <button id="loginBtn" class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">
                <i class="fab fa-google text-red-500"></i> Google 登入
            </button>
            <button id="openModalBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium transition-all shadow-md active:scale-95">
                <i class="fas fa-plus"></i> <span class="hidden sm:inline">新增</span>
            </button>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="pt-24 pb-12 px-6 max-w-7xl mx-auto">
        <!-- 數據面板 -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center mb-4 text-emerald-500">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <h4 class="text-slate-500 text-xs font-bold uppercase tracking-wider">資產總估值</h4>
                <p id="statTotalValue" class="text-2xl font-black text-slate-800 mt-1">$0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center mb-4 text-blue-500">
                    <i class="fas fa-archive"></i>
                </div>
                <h4 class="text-slate-500 text-xs font-bold uppercase tracking-wider">典藏數量</h4>
                <p id="statTotalItems" class="text-2xl font-black text-slate-800 mt-1">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center mb-4 text-amber-500">
                    <i class="fas fa-star"></i>
                </div>
                <h4 class="text-slate-500 text-xs font-bold uppercase tracking-wider">平均喜愛度</h4>
                <p id="statAvgRating" class="text-2xl font-black text-slate-800 mt-1">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center mb-4 text-purple-500">
                    <i class="fas fa-chart-pie"></i>
                </div>
                <h4 class="text-slate-500 text-xs font-bold uppercase tracking-wider">分類多樣性</h4>
                <p id="statCategories" class="text-2xl font-black text-slate-800 mt-1">0</p>
            </div>
        </div>

        <!-- 收藏列表 -->
        <h2 class="text-lg font-bold text-slate-800 mb-6" id="listTitle">我的典藏 (0)</h2>
        <div id="itemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 動態插入卡片 -->
        </div>
    </main>

    <!-- 新增彈窗 (Modal) -->
    <div id="addModal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold">新增收藏項目</h3>
                <button id="closeModalBtn" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="addForm" class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2">
                        <label class="text-xs font-bold text-slate-500 mb-1 block">項目名稱</label>
                        <input type="text" id="itemName" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="輸入名稱...">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 mb-1 block">預估價值 (TWD)</label>
                        <input type="number" id="itemPrice" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 mb-1 block">分類</label>
                        <select id="itemCategory" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option>一般</option>
                            <option>藝術</option>
                            <option>電子產品</option>
                            <option>時尚</option>
                            <option>收藏品</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 mb-2 block">喜愛程度</label>
                    <div id="ratingStars" class="flex gap-2">
                        <!-- 動態星星 -->
                        <button type="button" data-val="1" class="star-btn text-amber-500 p-1"><i class="fas fa-star"></i></button>
                        <button type="button" data-val="2" class="star-btn text-amber-500 p-1"><i class="fas fa-star"></i></button>
                        <button type="button" data-val="3" class="star-btn text-amber-500 p-1"><i class="fas fa-star"></i></button>
                        <button type="button" data-val="4" class="star-btn text-amber-500 p-1"><i class="fas fa-star"></i></button>
                        <button type="button" data-val="5" class="star-btn text-amber-500 p-1"><i class="fas fa-star"></i></button>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 mb-2 block">上傳圖片 (Base64)</label>
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-4 hover:border-indigo-400 transition-colors text-center relative">
                        <input type="file" id="itemImage" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        <div id="imagePreview" class="hidden h-32 w-full flex items-center justify-center">
                            <img src="" id="previewImg" class="h-full object-contain rounded-lg">
                        </div>
                        <div id="uploadPlaceholder" class="py-4 text-slate-400">
                            <i class="fas fa-upload text-xl mb-2"></i>
                            <p class="text-sm">點擊上傳圖片</p>
                        </div>
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition-all active:scale-95">
                    建立收藏
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAZ_qGlg1DK6DXmRN7Bkfj5DngJdQKYJ2I",
            authDomain: "collector-5655b.firebaseapp.com",
            projectId: "collector-5655b",
            storageBucket: "collector-5655b.firebasestorage.app",
            messagingSenderId: "678793560741",
            appId: "1:678793560741:web:348c114ac69d4a5fa2834c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "collector-5655b";

        // 狀態變數
        let currentUser = null;
        let currentRating = 5;
        let base64Image = "";
        let allItems = [];

        // DOM 元素
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const itemsGrid = document.getElementById('itemsGrid');
        const addModal = document.getElementById('addModal');
        const searchInput = document.getElementById('searchInput');

        // 初始化驗證
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && !user.isAnonymous) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                userName.innerText = user.displayName;
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                if (!user) signInAnonymously(auth);
            }
            initDataListener();
        });

        // 資料監聽
        function initDataListener() {
            if (!currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'collections');
            onSnapshot(colRef, (snapshot) => {
                allItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderItems();
            });
        }

        // 渲染列表與統計
        function renderItems() {
            const term = searchInput.value.toLowerCase();
            const filtered = allItems.filter(i => i.name.toLowerCase().includes(term) || i.category.toLowerCase().includes(term));
            
            // 更新統計
            const total = filtered.reduce((s, i) => s + (Number(i.price) || 0), 0);
            const avg = filtered.length ? (filtered.reduce((s, i) => s + i.rating, 0) / filtered.length).toFixed(1) : 0;
            const cats = [...new Set(filtered.map(i => i.category))].length;

            document.getElementById('statTotalValue').innerText = `$${total.toLocaleString()}`;
            document.getElementById('statTotalItems').innerText = filtered.length;
            document.getElementById('statAvgRating').innerText = avg;
            document.getElementById('statCategories').innerText = cats;
            document.getElementById('listTitle').innerText = `我的典藏 (${filtered.length})`;

            itemsGrid.innerHTML = filtered.map(item => `
                <div class="group bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden hover:shadow-xl transition-all duration-300 card-hover">
                    <div class="aspect-square bg-slate-50 relative">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-200"><i class="fas fa-image fa-3x"></i></div>`}
                        <div class="absolute top-3 left-3 px-2 py-1 bg-white/90 backdrop-blur rounded-lg text-[10px] font-bold shadow-sm">${item.category}</div>
                        <button onclick="deleteItem('${item.id}')" class="absolute top-3 right-3 p-2 bg-white/90 backdrop-blur text-slate-400 hover:text-red-500 rounded-full opacity-100 md:opacity-0 group-hover:opacity-100 transition-all shadow-sm">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-slate-800 truncate">${item.name}</h3>
                            <div class="flex items-center text-amber-500">
                                <i class="fas fa-star text-xs"></i>
                                <span class="text-xs font-bold ml-1">${item.rating}</span>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">預估價值</p>
                                <p class="text-lg font-black text-indigo-600">$${Number(item.price).toLocaleString()}</p>
                            </div>
                            <p class="text-[10px] text-slate-300 italic">By ${item.ownerName || '訪客'}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 事件綁定
        window.deleteItem = async (id) => {
            if (confirm('確定要刪除此收藏嗎？')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'collections', id));
            }
        };

        loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        logoutBtn.onclick = () => signOut(auth);
        document.getElementById('openModalBtn').onclick = () => addModal.classList.remove('hidden');
        document.getElementById('closeModalBtn').onclick = () => addModal.classList.add('hidden');
        searchInput.oninput = renderItems;

        // 星星評分
        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.onclick = () => {
                currentRating = parseInt(btn.dataset.val);
                document.querySelectorAll('.star-btn').forEach((b, idx) => {
                    b.classList.toggle('text-amber-500', idx < currentRating);
                    b.classList.toggle('text-slate-300', idx >= currentRating);
                });
            };
        });

        // 圖片上傳
        document.getElementById('itemImage').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 700000) { alert('圖片太大囉！請小於 700KB'); return; }
                const reader = new FileReader();
                reader.onloadend = () => {
                    base64Image = reader.result;
                    document.getElementById('previewImg').src = base64Image;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // 提交表單
        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const category = document.getElementById('itemCategory').value;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'collections'), {
                    name,
                    price: Number(price),
                    category,
                    rating: currentRating,
                    image: base64Image,
                    ownerName: currentUser.displayName || '匿名收藏家',
                    ownerId: currentUser.uid,
                    createdAt: new Date().toISOString()
                });
                addModal.classList.add('hidden');
                document.getElementById('addForm').reset();
                base64Image = "";
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('uploadPlaceholder').classList.remove('hidden');
            } catch (err) {
                console.error(err);
            }
        };
    </script>
</body>
</html>
